<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>마중 유스케이스 다이어그램</title>
<style>
  body { margin: 0; background: #fff; }
  svg { display: block; font-family: "Malgun Gothic", "Segoe UI", sans-serif; }
  .ttl   { font-size: 38px; font-weight: 700; fill: #0E2841; }
  .sub   { font-size: 21px; fill: #16324a; }
  .bnd   { fill: #f7fafd; stroke: #9cc2e5; stroke-width: 1.8; }
  .bndt  { font-size: 26px; font-weight: 700; fill: #2178BA; }
  .uc    { fill: #fff; stroke: #2178BA; stroke-width: 1.6; }
  .ucg   { fill: #e7f0fa; stroke: #2178BA; stroke-width: 2.4; }
  .ucm   { font-size: 25px; font-weight: 700; fill: #0E2841; text-anchor: middle; }
  .ucs   { font-size: 19.5px; fill: #16324a; text-anchor: middle; }
  .al    { stroke: #44607e; stroke-width: 1.6; fill: none; }
  .dl    { stroke: #16324a; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; }
  .lbl   { font-size: 19px; fill: #16324a; font-style: italic; }
  .act   { stroke: #0E2841; stroke-width: 2.2; fill: none; }
  .acthead { fill: #fff; stroke: #0E2841; stroke-width: 2.2; }
  .actt  { font-size: 24px; font-weight: 700; fill: #0E2841; text-anchor: middle; }
  .acts  { font-size: 20px; fill: #16324a; text-anchor: middle; }
  .sysb  { fill: #fff; stroke: #0E2841; stroke-width: 1.8; }
  .llmb  { fill: #fff; stroke: #2178BA; stroke-width: 1.6; stroke-dasharray: 7 4; }
  .trg   { fill: #deebf7; stroke: #2178BA; stroke-width: 1.6; }
  .warn  { font-size: 19px; font-weight: 700; fill: #0E2841; text-anchor: middle; }
  .strip { fill: #deebf7; }
  .stript{ font-size: 22px; font-weight: 700; fill: #0E2841; text-anchor: middle; }
</style>
</head>
<body>
<svg viewBox="0 0 1600 1160" width="1600" height="1160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#44607e"/>
    </marker>
    <marker id="ahd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#16324a" stroke-width="1.6"/>
    </marker>
  </defs>

  <g transform="scale(0.78)">
  <!-- 제목 -->
  <text class="ttl" x="50" y="58">마중 유스케이스: 위임형 뱅킹 에이전트</text>
  <text class="sub" x="50" y="92">실선은 액터 연계, 점선은 포함과 확장, (모의)는 예선 모의 구현 범위</text>

  <!-- 시스템 경계 -->
  <rect class="bnd" x="448" y="136" width="1156" height="1224" rx="20"/>
  <text class="bndt" x="1026" y="178" text-anchor="middle">마중, 위임형 뱅킹 에이전트</text>

  <!-- ── 액터: 외국인 근로자 ── -->
  <g>
    <circle class="acthead" cx="200" cy="356" r="18"/>
    <line class="act" x1="200" y1="375" x2="200" y2="428"/>
    <line class="act" x1="170" y1="394" x2="230" y2="394"/>
    <line class="act" x1="200" y1="428" x2="176" y2="466"/>
    <line class="act" x1="200" y1="428" x2="224" y2="466"/>
    <text class="actt" x="200" y="500">외국인 근로자</text>
    <text class="acts" x="200" y="524">(E-9, 모국어 사용)</text>
  </g>

  <!-- ── 액터: 관리자(JB) ── -->
  <g>
    <circle class="acthead" cx="200" cy="1090" r="18"/>
    <line class="act" x1="200" y1="1109" x2="200" y2="1162"/>
    <line class="act" x1="170" y1="1128" x2="230" y2="1128"/>
    <line class="act" x1="200" y1="1162" x2="176" y2="1200"/>
    <line class="act" x1="200" y1="1162" x2="224" y2="1200"/>
    <text class="actt" x="200" y="1234">관리자 (JB)</text>
    <text class="acts" x="200" y="1258">대시보드와 STR 검토</text>
  </g>

  <!-- ── LLM (의도 파싱만, 실행 경로 밖) ── -->
  <g>
    <rect class="llmb" x="64" y="128" width="300" height="92" rx="12"/>
    <text class="actt" x="214" y="166">LLM: 의도 해석만</text>
    <text class="warn" x="214" y="198">실행 경로에 없고 결정 권한 없음</text>
  </g>

  <!-- ── 트리거(이벤트) ── -->
  <g>
    <rect class="trg" x="58" y="816" width="296" height="86" rx="14"/>
    <text class="actt" x="206" y="854">급여 입금 감지, 환율 피드</text>
    <text class="acts" x="206" y="882">자동 작동 (고객 개입 없음)</text>
  </g>

  <!-- ── 외부 시스템(우측) ── -->
  <g>
    <rect class="sysb" x="1706" y="414" width="266" height="98" rx="12"/>
    <text class="actt" x="1839" y="452">JB 심사엔진 (모의)</text>
    <text class="acts" x="1839" y="480">외부 시스템, 승인은 배타적 권한</text>
  </g>
  <g>
    <rect class="sysb" x="1706" y="850" width="266" height="98" rx="12"/>
    <text class="actt" x="1839" y="888">한패스 송금망 (모의)</text>
    <text class="acts" x="1839" y="916">외부 시스템, 송금망 연계</text>
  </g>

  <!-- ── 유스케이스 1열 ── -->
  <g>
    <ellipse class="uc" cx="762" cy="272" rx="184" ry="58"/>
    <text class="ucm" x="762" y="268">위임장 발급과 서명</text>
    <text class="ucs" x="762" y="294">모국어 재확인 + 전자서명</text>

    <ellipse class="uc" cx="762" cy="462" rx="184" ry="58"/>
    <text class="ucm" x="762" y="458">사채 대환 가심사</text>
    <text class="ucs" x="762" y="484">연 약 250만 원 절약 안내 (승인 아님)</text>

    <ellipse class="uc" cx="762" cy="652" rx="184" ry="58"/>
    <text class="ucm" x="762" y="648">위임 철회</text>
    <text class="ucs" x="762" y="674">무조건 철회권 (사유와 수수료 없음)</text>

    <ellipse class="uc" cx="762" cy="898" rx="184" ry="58"/>
    <text class="ucm" x="762" y="894">위임 송금 자동 실행</text>
    <text class="ucs" x="762" y="920">급여 감지로 작동, 1회/월 200만 한도</text>

    <ellipse class="uc" cx="762" cy="1196" rx="184" ry="58"/>
    <text class="ucm" x="762" y="1192">감사로그와 STR 큐 조회</text>
    <text class="ucs" x="762" y="1218">전 게이트 판정 기록, 설명 가능</text>
  </g>

  <!-- ── 유스케이스 2열 ── -->
  <g>
    <ellipse class="uc" cx="1346" cy="272" rx="184" ry="58"/>
    <text class="ucm" x="1346" y="268">건별 모국어 통지</text>
    <text class="ucs" x="1346" y="294">실행과 보류 즉시 알림 + [철회]</text>

    <ellipse class="uc" cx="1346" cy="462" rx="184" ry="58"/>
    <text class="ucm" x="1346" y="458">JB 심사엔진 회부</text>
    <text class="ucs" x="1346" y="484">승인이 아닌 접수번호 발급</text>

    <ellipse class="uc" cx="1346" cy="652" rx="184" ry="58"/>
    <text class="ucm" x="1346" y="648">의심거래 자동 보류</text>
    <text class="ucs" x="1346" y="674">모국어 질문, 점수 70 이상 STR 큐</text>

    <ellipse class="ucg" cx="1346" cy="898" rx="184" ry="58"/>
    <text class="ucm" x="1346" y="894">3중 게이트 판정</text>
    <text class="ucs" x="1346" y="920" style="font-size:17px">A 위임장, B 규칙과 환율, C AML</text>

    <ellipse class="uc" cx="1346" cy="1144" rx="184" ry="58"/>
    <text class="ucm" x="1346" y="1140">사기 수취인 차단</text>
    <text class="ucs" x="1346" y="1166">사기 차단 명단 판정 시 즉시 차단</text>
  </g>

  <!-- ── 액터 연계(실선) ── -->
  <line class="al" x1="243" y1="384" x2="588" y2="286"/>
  <line class="al" x1="245" y1="408" x2="588" y2="456"/>
  <line class="al" x1="240" y1="432" x2="588" y2="636"/>
  <line class="al" x1="243" y1="1146" x2="588" y2="1192"/>
  <!-- 트리거 → 자동 실행 -->
  <line class="al" x1="354" y1="862" x2="580" y2="892" marker-end="url(#ah)"/>
  <!-- 회부 → JB 심사엔진 / 게이트 통과 → 한패스 -->
  <line class="al" x1="1530" y1="462" x2="1706" y2="462" marker-end="url(#ah)"/>
  <text class="lbl" x="1542" y="448">회부(접수번호)</text>
  <line class="al" x1="1530" y1="898" x2="1706" y2="898" marker-end="url(#ah)"/>
  <text class="lbl" x="1540" y="884">통과 시 송금</text>

  <!-- ── LLM 점선(의도 파싱) ── -->
  <line class="dl" x1="330" y1="220" x2="610" y2="252" marker-end="url(#ahd)"/>
  <text class="lbl" x="404" y="216">의도 해석</text>
  <line class="dl" x1="276" y1="220" x2="606" y2="436" marker-end="url(#ahd)"/>

  <!-- ── 포함 / 확장 ── -->
  <line class="dl" x1="946" y1="898" x2="1162" y2="898" marker-end="url(#ahd)"/>
  <text class="lbl" x="980" y="884">포함: 전부 통과 시만 실행</text>

  <path class="dl" d="M906,856 L1196,316" marker-end="url(#ahd)"/>
  <text class="lbl" x="1016" y="572" transform="rotate(-61 1016 572)">포함: 건별 통지</text>

  <path class="dl" d="M1182,688 L948,860" marker-end="url(#ahd)"/>
  <text class="lbl" x="956" y="760">확장: 위임 범위 밖이거나 의심</text>

  <line class="dl" x1="1346" y1="1086" x2="1346" y2="956" marker-end="url(#ahd)"/>
  <text class="lbl" x="1360" y="1028">확장: 사기 차단 명단</text>

  <line class="dl" x1="946" y1="462" x2="1162" y2="462" marker-end="url(#ahd)"/>
  <text class="lbl" x="986" y="448">포함: 가심사 후 회부</text>

  <!-- ── 운영 원칙 스트립 ── -->
  <rect class="strip" x="50" y="1392" width="1940" height="60" rx="12"/>
  <text class="stript" x="1020" y="1430">송금 절차는 LLM 없이 진행. 판단(게이트 A, B, C)에서 행동(실행, 보류, 차단)으로, 그리고 검증과 개선(감사로그, STR 큐)으로 이어짐</text>
  </g>
</svg>
</body>
</html>
