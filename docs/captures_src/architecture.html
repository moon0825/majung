<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>마중 3중 게이트 아키텍처</title>
<style>
  body { margin: 0; background: #fff; }
  svg { display: block; font-family: "Malgun Gothic", "Segoe UI", sans-serif; }
  .ttl   { font-size: 36px; font-weight: 700; fill: #0E2841; }
  .band1 { fill: #2178BA; } .band1t { fill: #FFFFFF; }
  .band2 { fill: #2178BA; } .band3 { fill: #2178BA; } .band4 { fill: #0E2841; }
  .bandt { font-size: 23px; font-weight: 700; fill: #fff; text-anchor: middle; }
  .chev  { font-size: 32px; font-weight: 700; fill: #2178BA; text-anchor: middle; }
  .box   { fill: #fff; stroke: #8aa6c4; stroke-width: 1.4; }
  .boxh  { font-size: 25px; font-weight: 700; fill: #0E2841; }
  .boxs  { font-size: 20px; fill: #16324a; }
  .llm   { fill: #fff; stroke: #2178BA; stroke-width: 1.6; stroke-dasharray: 7 4; }
  .chip  { fill: #fbeae8; }
  .chipt { font-size: 19px; font-weight: 700; fill: #a3301f; text-anchor: middle; }
  .gatec { fill: #eef5fc; stroke: #2178BA; stroke-width: 2; }
  .gate  { fill: #fff; stroke: #2178BA; stroke-width: 1.6; }
  .gateh { font-size: 26px; font-weight: 700; fill: #2178BA; }
  .ok    { fill: #e6f4ea; stroke: #1a7f37; stroke-width: 1.8; }
  .okh   { font-size: 25px; font-weight: 700; fill: #146c2e; }
  .hd    { fill: #fff4d6; stroke: #9a6700; stroke-width: 1.8; }
  .hdh   { font-size: 25px; font-weight: 700; fill: #875b00; }
  .bk    { fill: #fbeae8; stroke: #c0392b; stroke-width: 1.8; }
  .bkh   { font-size: 25px; font-weight: 700; fill: #a3301f; }
  .vf    { fill: #fff; stroke: #0E2841; stroke-width: 1.8; }
  .ar    { stroke: #44607e; stroke-width: 1.6; fill: none; }
  .ard   { stroke: #16324a; stroke-width: 1.4; fill: none; stroke-dasharray: 7 4; }
  .lbl   { font-size: 20px; font-weight: 700; fill: #16324a; }
  .strip { fill: #deebf7; }
  .stript{ font-size: 21px; font-weight: 700; fill: #0E2841; text-anchor: middle; }
</style>
</head>
<body>
<svg viewBox="0 0 1660 812" width="1660" height="812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#44607e"/>
    </marker>
    <marker id="ahd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#16324a" stroke-width="1.6"/>
    </marker>
  </defs>

  <g transform="scale(0.76)">
  <!-- 제목 -->
  <text class="ttl" x="56" y="58">마중 시스템 구성: 3중 게이트 아키텍처</text>

  <!-- 평가 라벨 밴드: 수집 → 판단 → 행동 → 검증·개선 -->
  <rect class="band1" x="56"   y="100" width="752" height="44" rx="10"/>
  <text class="bandt band1t" x="432" y="130">트리거: 요청·급여·환율</text>
  <text class="chev" x="840" y="134">→</text>
  <rect class="band2" x="872"  y="100" width="566" height="44" rx="10"/>
  <text class="bandt" x="1155" y="130">판단: 게이트 A, B, C (규칙 기반 코드)</text>
  <text class="chev" x="1466" y="134">→</text>
  <rect class="band3" x="1498" y="100" width="354" height="44" rx="10"/>
  <text class="bandt" x="1675" y="130">행동: 실행/보류/차단</text>
  <text class="chev" x="1882" y="134">→</text>
  <rect class="band4" x="1914" y="100" width="240" height="44" rx="10"/>
  <text class="bandt" x="2034" y="130">검증·개선</text>

  <!-- ── 수집: 입력 3종 ── -->
  <rect class="box" x="84" y="188" width="352" height="120" rx="12"/>
  <text class="boxh" x="108" y="226">사용자 요청 (모국어)</text>
  <text class="boxs" x="108" y="256">"Lương về thì gửi cho mẹ…"</text>
  <text class="boxs" x="108" y="282">베트남어를 채팅 화면으로 입력</text>

  <rect class="box" x="84" y="356" width="352" height="120" rx="12"/>
  <text class="boxh" x="108" y="394">급여 입금 감지</text>
  <text class="boxs" x="108" y="424">모의 뱅킹 코어가 입금 내역 감지</text>
  <text class="boxs" x="108" y="450">+210만원, 위임 송금 자동 작동</text>

  <rect class="box" x="84" y="524" width="352" height="120" rx="12"/>
  <text class="boxh" x="108" y="562">환율 피드 KRW/VND</text>
  <text class="boxs" x="108" y="592">현재 18.45, 7일평균 18.12</text>
  <text class="boxs" x="108" y="618">+1.82%, 임계치(1% 이상) 충족</text>

  <!-- ── LLM 의도 파싱 (점선 = 실행 경로 밖) ── -->
  <rect class="llm" x="532" y="188" width="312" height="172" rx="12"/>
  <text class="boxh" x="556" y="226">LLM 의도 해석</text>
  <text class="boxs" x="556" y="256">고객의 말을 정리된 의도로</text>
  <text class="boxs" x="556" y="282">조건 후보 생성까지만 담당</text>
  <rect class="chip" x="554" y="300" width="268" height="38" rx="19"/>
  <text class="chipt" x="688" y="325">실행 결정 배제, 송금 경로 밖</text>

  <!-- ── 판단: 3중 게이트 컨테이너 ── -->
  <rect class="gatec" x="896" y="188" width="540" height="610" rx="16"/>
  <text class="gateh" x="1166" y="224" text-anchor="middle">3중 게이트: 전부 규칙 기반 코드</text>
  <text class="boxs"  x="1166" y="252" text-anchor="middle">LLM 결과는 입력 자료일 뿐, 판정과 실행 권한 없음</text>

  <rect class="gate" x="924" y="276" width="484" height="134" rx="12"/>
  <text class="gateh" x="948" y="312">게이트 A: 위임장 검증</text>
  <text class="boxs" x="948" y="340">전자서명, 유효기간, 철회 여부, 위임 범위</text>
  <text class="boxs" x="948" y="366">위임장 JSON 데이터 양식 대조 (전금법 거래지시 모의)</text>

  <rect class="gate" x="924" y="452" width="484" height="134" rx="12"/>
  <text class="gateh" x="948" y="488">게이트 B: 규칙 한도와 환율 조건</text>
  <text class="boxs" x="948" y="516">1회/월 200만원 한도, 환율 7일평균 대비 1% 이상</text>
  <text class="boxs" x="948" y="542">예측이 아닌, 사용자가 정한 임계조건만 실행</text>

  <rect class="gate" x="924" y="628" width="484" height="134" rx="12"/>
  <text class="gateh" x="948" y="664">게이트 C: 허용 수취인 명단 + AML</text>
  <text class="boxs" x="948" y="692">사기 차단 명단은 즉시 차단, 점수 임계치 40과 70</text>
  <text class="boxs" x="948" y="718">신규, 고액, 심야, 분할 송금에 가중 후 의심 탐지</text>

  <line class="ar" x1="1166" y1="410" x2="1166" y2="452" marker-end="url(#ah)"/>
  <text class="lbl" x="1178" y="440">통과</text>
  <line class="ar" x1="1166" y1="586" x2="1166" y2="628" marker-end="url(#ah)"/>
  <text class="lbl" x="1178" y="616">통과</text>

  <!-- ── 수집 → LLM / 게이트 화살표 ── -->
  <line class="ar" x1="436" y1="248" x2="532" y2="248" marker-end="url(#ah)"/>
  <line class="ar" x1="844" y1="276" x2="918" y2="308" marker-end="url(#ah)"/>
  <text class="lbl" x="826" y="266">의도</text>
  <line class="ar" x1="436" y1="416" x2="896" y2="476" marker-end="url(#ah)"/>
  <text class="lbl" x="560" y="424">자동 작동 (LLM 거치지 않음)</text>
  <line class="ar" x1="436" y1="588" x2="896" y2="560" marker-end="url(#ah)"/>
  <text class="lbl" x="604" y="606">환율 데이터</text>

  <!-- ── 행동: 3분기 ── -->
  <rect class="ok" x="1498" y="216" width="354" height="178" rx="12"/>
  <text class="okh" x="1522" y="254">실행: 자동 송금</text>
  <text class="boxs" x="1522" y="284">한패스 송금망(모의), 거래번호 발급</text>
  <text class="boxs" x="1522" y="310">건별 모국어 통지와 철회 버튼</text>
  <text class="boxs" x="1522" y="336">고객 개입 없이 수면 중 실행</text>
  <text class="boxs" x="1522" y="362">잔액과 감사로그 즉시 반영</text>

  <rect class="hd" x="1498" y="446" width="354" height="150" rx="12"/>
  <text class="hdh" x="1522" y="484">자동 보류 + 모국어 질문</text>
  <text class="boxs" x="1522" y="514">"정말 보내려는 분이 맞습니까?"</text>
  <text class="boxs" x="1522" y="540">점수 70 이상이면 STR 후보 큐 등록</text>
  <text class="boxs" x="1522" y="566">사람 확인 전에는 실행 안 함 (송금 0원)</text>

  <rect class="bk" x="1498" y="648" width="354" height="136" rx="12"/>
  <text class="bkh" x="1522" y="686">즉시 차단 + 경고</text>
  <text class="boxs" x="1522" y="716">OTP와 선입금 요구는 사기 패턴</text>
  <text class="boxs" x="1522" y="742">사기 차단 명단 판정, 재시도 불가</text>

  <line class="ar" x1="1424" y1="686" x2="1498" y2="316" marker-end="url(#ah)"/>
  <text class="lbl" x="1436" y="476" fill="#146c2e">통과</text>
  <line class="ar" x1="1424" y1="712" x2="1498" y2="518" marker-end="url(#ah)"/>
  <text class="lbl" x="1436" y="618" fill="#875b00">보류, STR</text>
  <line class="ar" x1="1424" y1="738" x2="1498" y2="712" marker-end="url(#ah)"/>
  <text class="lbl" x="1436" y="762" fill="#a3301f">차단</text>

  <!-- ── 검증·개선 ── -->
  <rect class="vf" x="1914" y="216" width="240" height="568" rx="12"/>
  <text class="boxh" x="1938" y="254">검증·개선</text>
  <text class="boxs" x="1938" y="292">감사로그</text>
  <text class="boxs" x="1938" y="316">- 전 게이트 판정 기록</text>
  <text class="boxs" x="1938" y="356">관리자 대시보드</text>
  <text class="boxs" x="1938" y="380">- 처리 경로 실시간 표시</text>
  <text class="boxs" x="1938" y="420">STR 후보 큐</text>
  <text class="boxs" x="1938" y="444">- 담당자 검토와 보고</text>
  <text class="boxs" x="1938" y="484">건별 통지 수신 확인</text>
  <text class="boxs" x="1938" y="524">환율 임계값 조정 제안</text>
  <text class="boxs" x="1938" y="548">- 사용자 승인 시 반영</text>

  <line class="ar" x1="1852" y1="305" x2="1914" y2="305" marker-end="url(#ah)"/>
  <line class="ar" x1="1852" y1="521" x2="1914" y2="450" marker-end="url(#ah)"/>
  <line class="ar" x1="1852" y1="716" x2="1914" y2="540" marker-end="url(#ah)"/>

  <!-- 개선 루프 -->
  <path class="ard" d="M2019,784 L2019,856 L1166,856 L1166,804" marker-end="url(#ahd)"/>
  <text class="lbl" x="1300" y="846">개선 루프: 임계값 조정 제안 (사용자 승인 시 위임장 갱신)</text>

  <!-- ── 하단 고지 스트립 ── -->
  <rect class="strip" x="56" y="924" width="2098" height="120" rx="12"/>
  <text class="stript" x="1105" y="966">송금 실행은 LLM이 아니라 정해진 규칙대로만 작동하는 규칙 기반 코드가 처리하며, LLM 결과는 게이트의 입력 자료일 뿐 판정과 실행 권한이 없음</text>
  <text class="stript" x="1105" y="998">위임장 3요건 = 전자서명 + 건별 통지 + 무조건 철회권 (전금법 거래지시 모의), 환율은 예측이 아닌 사용자 규칙으로만 실행</text>
  <text class="stript" x="1105" y="1030">대출 승인은 JB 심사엔진의 배타적 권한, 에이전트는 안내와 가심사까지 수행</text>
  </g>
</svg>
</body>
</html>
